<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>ESP32-CAM RC</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Custom Animated Popup -->
    <div id="confirm-popup" class="popup-overlay hidden">
      <div class="popup-box">
        <p>Are you sure you want to update this setting?</p>
        <div class="popup-actions">
          <button id="popup-cancel" class="btn ghost" type="button">Cancel</button>
          <button id="popup-confirm" class="btn primary" type="button">Confirm</button>
        </div>
      </div>
    </div>

    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot" id="ws-dot"></span>
          <div>
            <div class="title">ESP32-CAM RC</div>
            <div class="subtitle" id="ws-status">Offline</div>
          </div>
        </div>
        <div class="mode-toggle" role="group" aria-label="Control mode">
          <button class="chip active" id="mode-joystick" type="button">Joystick</button>
          <button class="chip" id="mode-buttons" type="button">Buttons</button>
        </div>
      </header>

      <main class="layout">
        <!-- 1. Settings & Power -->
        <section class="settings glass">
          <div class="panel-header">
            <span>Power & Tuning</span>
            <span class="hint">Live tuning</span>
          </div>
          
          <div class="setting">
            <label>Forward Power</label>
            <div class="segmented-group" id="fwd-power-group">
              <button class="seg-btn" data-val="90">Low</button>
              <button class="seg-btn active" data-val="180">Medium</button>
              <button class="seg-btn" data-val="255">Max</button>
            </div>
          </div>

          <div class="setting">
            <label>Backward Power</label>
            <div class="segmented-group" id="bwd-power-group">
              <button class="seg-btn" data-val="90">Low</button>
              <button class="seg-btn active" data-val="180">Medium</button>
              <button class="seg-btn" data-val="255">Max</button>
            </div>
          </div>

          <div class="setting">
            <label>Drive Sensitivity</label>
            <div class="custom-slider-container">
              <div class="custom-slider-wrapper">
                <input type="range" min="0.4" max="1.5" step="0.05" value="1" class="custom-slider" id="drive-sensitivity" />
                <div class="slider-icon">
                  <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                </div>
              </div>
            </div>
          </div>

          <div class="setting">
            <label>Turning Sensitivity</label>
            <div class="custom-slider-container">
              <div class="custom-slider-wrapper">
                <input type="range" min="0.4" max="1.5" step="0.05" value="1" class="custom-slider" id="turn-sensitivity" />
                <div class="slider-icon">
                  <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="3.5" y1="17.5" x2="9" y2="14"/><line x1="20.5" y1="17.5" x2="15" y2="14"/></svg>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 2. Camera Panel -->
        <section class="camera-panel glass">
          <div class="panel-header">
            <span>Camera</span>
            <span class="status" id="camera-status">OFFLINE</span>
          </div>
          
          <div class="custom-slider-container">
            <div class="custom-slider-wrapper">
              <input type="range" min="0" max="100" value="0" class="custom-slider" id="brightness-slider" />
              <div class="slider-icon">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              </div>
            </div>
          </div>

          <div class="camera-frame" id="camera-frame">
            <div id="camera-placeholder" class="camera-placeholder">
              <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </div>
            <img id="camera-stream" style="display:none;" draggable="false" />
          </div>

          <div class="panel-actions">
            <button class="btn primary" id="camera-start" type="button">Start</button>
            <button class="btn ghost" id="camera-stop" type="button">Stop</button>
          </div>
        </section>

        <!-- 3. Controls -->
        <section class="controls glass">
          <div class="panel-header">
            <span>Drive</span>
            <span class="hint">Thumb-friendly</span>
          </div>
          <div class="control-body">
            <div class="joystick-zone" id="joystick-zone">
              <div class="joystick-base"></div>
              <div class="joystick-knob" id="joystick-knob"></div>
            </div>
            <div class="button-zone" id="button-zone">
              <button class="btn pad" data-dir="FORWARD">Forward</button>
              <div class="row">
                <button class="btn pad" data-dir="LEFT">Left</button>
                <button class="btn pad danger" data-dir="STOP">Stop</button>
                <button class="btn pad" data-dir="RIGHT">Right</button>
              </div>
              <button class="btn pad" data-dir="BACKWARD">Backward</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
