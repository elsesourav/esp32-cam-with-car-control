<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>ESP32-CAM RC Control</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot" id="ws-dot"></span>
          <div>
            <div class="title">ESP32-CAM RC</div>
            <div class="subtitle" id="ws-status">Offline</div>
          </div>
        </div>
        <div class="mode-toggle" role="group" aria-label="Control mode">
          <button class="chip active" id="mode-joystick" type="button">
            Joystick
          </button>
          <button class="chip" id="mode-buttons" type="button">Buttons</button>
        </div>
      </header>

      <main class="layout">
        <section class="camera-panel glass">
          <div class="panel-header">
            <span>Camera</span>
            <span class="status" id="camera-status">OFFLINE</span>
          </div>
          <div class="led-light-slider-container">
            <div class="led-light-slider-wrapper">
              <input
                type="range"
                min="0"
                max="100"
                value="0"
                class="led-light-slider"
                id="brightness-slider"
              />
              <div class="led-light-icon">☀️</div>
            </div>
          </div>
          <div class="camera-frame">
            <img
              id="camera-stream"
              style="
                width: 100%;
                height: 100%;
                object-fit: contain;
                background: #000;
              "
            />
          </div>
          <div class="panel-actions">
            <button class="btn primary" id="camera-start" type="button">
              Start
            </button>
            <button class="btn ghost" id="camera-stop" type="button">
              Stop
            </button>
          </div>
        </section>

        <section class="controls glass">
          <div class="panel-header">
            <span>Drive</span>
            <span class="hint">Thumb-friendly</span>
          </div>
          <div class="control-body">
            <div class="joystick-zone" id="joystick-zone">
              <div class="joystick-base"></div>
              <div class="joystick-knob" id="joystick-knob"></div>
            </div>
            <div class="button-zone" id="button-zone">
              <button class="btn pad" data-dir="FORWARD">Forward</button>
              <div class="row">
                <button class="btn pad" data-dir="LEFT">Left</button>
                <button class="btn pad danger" data-dir="STOP">Stop</button>
                <button class="btn pad" data-dir="RIGHT">Right</button>
              </div>
              <button class="btn pad" data-dir="BACKWARD">Backward</button>
            </div>
          </div>
        </section>

        <section class="settings glass">
          <div class="panel-header">
            <span>Settings</span>
            <span class="hint">Live tuning</span>
          </div>
          <div class="setting">
            <label for="drive-sensitivity">Driving Sensitivity</label>
            <input
              id="drive-sensitivity"
              type="range"
              min="0.4"
              max="1.5"
              step="0.05"
              value="1"
            />
          </div>
          <div class="setting">
            <label for="turn-sensitivity">Turning Sensitivity</label>
            <input
              id="turn-sensitivity"
              type="range"
              min="0.4"
              max="1.5"
              step="0.05"
              value="1"
            />
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
